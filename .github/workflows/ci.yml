name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npx turbo run type-check --filter='./packages/core' --filter='./packages/typescript'

  test-typescript:
    name: Test TypeScript (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npx turbo run test --filter='./packages/core' --filter='./packages/typescript'

  test-python:
    name: Test Python (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: packages/python/pyproject.toml

      - run: npm ci
      - run: npm run build

      - name: Install Python package
        working-directory: packages/python
        run: pip install -e ".[dev]"

      - name: Run pytest
        working-directory: packages/python
        run: pytest -v

  bundle-size:
    name: Bundle Size Check
    runs-on: ubuntu-latest
    needs: [test-typescript]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Check bundle size
        run: |
          RAW=$(wc -c < packages/typescript/dist/index.js)
          GZIP=$(gzip -c packages/typescript/dist/index.js | wc -c)
          echo "Raw: ${RAW} bytes"
          echo "Gzipped: ${GZIP} bytes"
          if [ "$GZIP" -gt 51200 ]; then
            echo "::error::Bundle size ${GZIP} bytes exceeds 50KB gzipped limit"
            exit 1
          fi
          echo "Bundle size OK: ${GZIP} bytes gzipped (limit: 51200)"
