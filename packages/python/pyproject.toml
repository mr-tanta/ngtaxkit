[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ngtaxkit"
version = "0.0.1"
description = "Nigerian tax compliance SDK — VAT, PAYE, WHT, Pension, Payroll, Invoicing"
requires-python = ">=3.10"
license = "MIT"

[project.optional-dependencies]
cloud = ["httpx>=0.27"]
pdf = ["fpdf2>=2.7"]
dev = ["pytest>=8.0", "hypothesis>=6.0"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.mypy]
strict = true

[tool.ruff]
target-version = "py310"
